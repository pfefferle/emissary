<!DOCTYPE html>
<html>
<head>
</head>
<body>
    <table role="presentation" border="0" cellpadding="0" cellspacing="0" style="border-collapse:collapse;"><tr><td style="
        font-family:-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif; 
        font-size:18px;
        opacity:0.9;
        max-width:630px;
        line-height:1.5em;">
    
        {{- if ne "" .Domain_Icon -}}
            <div style="margin-bottom:32px;">
                <img src="{{.Domain_Icon}}" style="width:40%;">
            </div>
        {{- end -}}

        <p>Hello {{.Name}},</p>
        
        <p>We just completed a request to your password on <b>{{.Domain_Name}}</b>.</p>
        <p>If you did not make this request then you should contact support immediately to protect your account identity.</p>
        
</td></tr></table>

</body>
</html>
